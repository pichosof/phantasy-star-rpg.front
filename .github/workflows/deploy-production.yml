name: Deploy frontend to Azure Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-production.yml'
      - 'index.html'
      - 'package.json'
      - 'public/**'
      - 'src/**'
      - 'tsconfig*.json'
      - 'vite.config.mts'
      - 'yarn.lock'
  workflow_dispatch:

concurrency:
  group: production-frontend
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    name: Build and deploy frontend
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Type-check
        run: yarn type-check

      - name: Lint
        run: node ./node_modules/eslint/bin/eslint.js "*/**/*.{js,ts,tsx}"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Azure CLI extensions
        run: |
          az extension add --name containerapp --upgrade --output none
          az extension add --name staticwebapp --upgrade --output none

      - name: Read Azure deployment values
        id: azure_config
        shell: bash
        env:
          API_CONTAINER_APP_NAME: ${{ secrets.API_CONTAINER_APP_NAME }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          STATIC_WEB_APP_NAME: ${{ secrets.STATIC_WEB_APP_NAME }}
          CLIENT_SECRET_NAME: ${{ secrets.CLIENT_SECRET_NAME }}
        run: |
          swa_token="$(az staticwebapp secrets list \
            --name "${STATIC_WEB_APP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query properties.apiKey \
            --output tsv)"

          client_secret="$(az containerapp secret show \
            --name "${API_CONTAINER_APP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --secret-name "${CLIENT_SECRET_NAME}" \
            --query value \
            --output tsv)"

          echo "::add-mask::${swa_token}"
          echo "::add-mask::${client_secret}"
          echo "swa_token=${swa_token}" >> "${GITHUB_OUTPUT}"
          echo "client_secret=${client_secret}" >> "${GITHUB_OUTPUT}"

      - name: Build production frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_BASE_URL: ${{ secrets.VITE_BASE_URL }}
          VITE_CLIENT_SECRET: ${{ steps.azure_config.outputs.client_secret }}
          VITE_SIMULATE_PROD: ${{ secrets.VITE_SIMULATE_PROD }}
          VITE_UPLOAD_MAX_MB: ${{ secrets.VITE_UPLOAD_MAX_MB }}
        run: yarn build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.azure_config.outputs.swa_token }}
          action: upload
          app_location: build
          skip_app_build: true
